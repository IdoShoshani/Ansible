plugin: community.general.proxmox
# These variables are injected by the AWX Credential we made in Step 2
url: "{{ lookup('env', 'PROXMOX_URL') }}"
user: "{{ lookup('env', 'PROXMOX_USER') }}"
token_id: "{{ lookup('env', 'PROXMOX_USER') }}" # Often the same as user in recent versions
token_secret: "{{ lookup('env', 'PROXMOX_TOKEN') }}"

validate_certs: false
want_facts: true

# Grouping: Automatically group VMs by their Proxmox tags
keyed_groups:
  - prefix: proxmox
    key: tags
