plugin: community.proxmox.proxmox
# These values should come from environment variables, locally or via AWX.
url: "{{ lookup('env', 'PROXMOX_URL') }}"
user: "{{ lookup('env', 'PROXMOX_USER') }}"
# Proxmox token auth expects the token name here, not the username.
token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
# Keep a fallback for older custom credential mappings that used PROXMOX_TOKEN.
token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') | default(lookup('env', 'PROXMOX_TOKEN'), true) }}"
cache: false
validate_certs: false
want_facts: true

# Grouping: Automatically group VMs by their Proxmox tags
# keyed_groups:
#   - prefix: proxmox_ido
#     key: tags
